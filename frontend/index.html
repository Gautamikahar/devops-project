<!DOCTYPE html>
<html>
<head>
  <title>DevOps Project</title>
</head>
<body>

  <h1>🚀 DevOps Project</h1>

  <!-- LOGIN -->
  <h2>Login</h2>
  <input id="username" placeholder="Enter username" />
  <br><br>
  <input id="password" type="password" placeholder="Enter password" />
  <br><br>
  <button onclick="login()">Login</button>

  <hr>

  <!-- REPORT ISSUE -->
  <h2>Report Issue</h2>
  <input id="title" placeholder="Enter issue title" />
  <br><br>
  <button onclick="submitIssue()">Submit</button>

  <hr>

  <!-- UPDATE ISSUE -->
  <h2>Update Issue Status (Admin)</h2>
  <input id="id" placeholder="Issue ID" />
  <br><br>
  <input id="status" placeholder="resolved / pending" />
  <br><br>
  <button onclick="updateStatus()">Update</button>

  <script>

    // LOGIN FUNCTION
    function login() {
      fetch("https://devops-project-1c2y.onrender.com/login", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          username: document.getElementById("username").value,
          password: document.getElementById("password").value
        })
      })
      .then(res => res.text())
      .then(data => alert(data))
      .catch(err => alert("Error: " + err));
    }

    // CREATE ISSUE FUNCTION
    function submitIssue() {
      fetch("https://devops-issue-service.onrender.com/issue", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          title: document.getElementById("title").value
        })
      })
      .then(res => res.json())
      .then(data => alert("Issue created: " + JSON.stringify(data)))
      .catch(err => alert("Error: " + err));
    }

    // UPDATE ISSUE STATUS FUNCTION
    function updateStatus() {
      const id = document.getElementById("id").value;

      fetch(`https://devops-admin-service.onrender.com/issue/${id}/status`, {
        method: "PUT",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          status: document.getElementById("status").value
        })
      })
      .then(res => res.text())
      .then(data => alert(data))
      .catch(err => alert("Error: " + err));
    }

  </script>

</body>
</html>
