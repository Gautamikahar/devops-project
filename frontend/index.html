<!DOCTYPE html>
<html>
<head>
  <title>DevOps Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      display: flex;
      background: #f4f6f9;
    }

    /* SIDEBAR */
    .sidebar {
      width: 220px;
      background: #2c3e50;
      color: white;
      height: 100vh;
      padding: 20px;
    }

    .sidebar h2 {
      margin-bottom: 20px;
    }

    .sidebar button {
      width: 100%;
      margin: 10px 0;
      padding: 10px;
      border: none;
      background: #34495e;
      color: white;
      cursor: pointer;
      border-radius: 5px;
    }

    .sidebar button:hover {
      background: #1abc9c;
    }

    /* MAIN */
    .main {
      flex: 1;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 20px;
      box-shadow: 0 5px 10px rgba(0,0,0,0.1);
      max-width: 400px;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button.action {
      background: #3498db;
      color: white;
      padding: 10px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button.action:hover {
      background: #2980b9;
    }

    .hidden {
      display: none;
    }

    /* POPUP */
    .popup {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 15px;
      border-radius: 8px;
      color: white;
      display: none;
    }

    .success { background: #2ecc71; }
    .error { background: #e74c3c; }

    /* LOADER */
    .loader {
      border: 5px solid #f3f3f3;
      border-top: 5px solid #3498db;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      animation: spin 1s linear infinite;
      display: none;
      margin: 10px auto;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    /* DARK MODE */
    .dark {
      background: #1e1e1e;
      color: white;
    }

    .dark .card {
      background: #2c2c2c;
    }
  </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar hidden" id="sidebar">
  <h2>Dashboard</h2>
  <button onclick="showSection('issue')">Report Issue</button>
  <button onclick="showSection('update')">Update Status</button>
  <button onclick="toggleDarkMode()">Toggle Dark Mode</button>
</div>

<!-- MAIN -->
<div class="main">

  <div id="popup" class="popup"></div>
  <div id="issueList"></div>
  <!-- LOGIN -->
  <div id="loginBox" class="card">
    <h2>Login</h2>
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <button class="action" onclick="login()">Login</button>
    <div class="loader" id="loader"></div>
  </div>

  <!-- ISSUE -->
  <div id="issue" class="card hidden">
    <h2>Report Issue</h2>
    <input id="title" placeholder="Enter issue">
    <button class="action" onclick="submitIssue()">Submit</button>
  </div>

  <!-- UPDATE -->
  <div id="update" class="card hidden">
    <h2>Update Issue Status</h2>
    <input id="issueId" placeholder="Issue ID">
    <input id="status" placeholder="resolved / pending">
    <button class="action" onclick="updateStatus()">Update</button>
  </div>

  

</div>

<script>
const USER_URL = "https://devops-project-1c2y.onrender.com";
const ISSUE_URL = "https://devops-issue-service.onrender.com";
const ADMIN_URL = "https://devops-project-admin-service.onrender.com";

let currentUser = ""; // ✅ STORE USER

function showPopup(msg, type) {
  const p = document.getElementById("popup");
  p.innerText = msg;
  p.className = "popup " + type;
  p.style.display = "block";
  setTimeout(() => p.style.display = "none", 3000);
}

function showSection(id) {
  document.getElementById("issue").classList.add("hidden");
  document.getElementById("update").classList.add("hidden");
  document.getElementById(id).classList.remove("hidden");
}

function toggleDarkMode() {
  document.body.classList.toggle("dark");
}

// ✅ LOGIN
async function login() {
  const loader = document.getElementById("loader");
  loader.style.display = "block";

  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  try {
    const res = await fetch(USER_URL + "/login", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ username, password })
    });

    const text = await res.text();
    loader.style.display = "none";

    if (res.ok) {
      currentUser = username;   // ✅ IMPORTANT FIX
      showPopup(text, "success");

      document.getElementById("loginBox").classList.add("hidden");
      document.getElementById("sidebar").classList.remove("hidden");

      showSection("issue");
      loadUserIssues(); // ✅ Load existing issues
    } else {
      showPopup(text, "error");
    }

  } catch {
    loader.style.display = "none";
    showPopup("Server error!", "error");
  }
}

// ✅ CREATE ISSUE
async function submitIssue() {
  const title = document.getElementById("title").value;

  const res = await fetch(ISSUE_URL + "/issue", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ title, username: currentUser }) // ✅ FIX
  });

  const data = await res.json();
  showPopup("Issue Created ID: " + data.id, "success");

  loadUserIssues(); // ✅ refresh list
}

// ✅ UPDATE STATUS
async function updateStatus() {
  const id = document.getElementById("issueId").value;
  const status = document.getElementById("status").value;
  const username = document.getElementById("username").value;

  const res = await fetch(ISSUE_URL + `/issue/${id}/status`, {
    method: "PUT",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ status })
  });

  const text = await res.text();
  showPopup(text, "success");

  // 🔥 refresh updated issues
  loadUserIssues(username);
}

// ✅ LOAD USER ISSUES
async function loadUserIssues() {
  if (!currentUser) return;

  const res = await fetch(ISSUE_URL + `/user/${currentUser}/issues`);
  const data = await res.json();

  let html = "<h3>Your Issues</h3>";

  if (data.length === 0) {
    html += "<p>No issues found</p>";
  } else {
    data.forEach(i => {
      html += `<p>ID: ${i.id} | ${i.title} | ${i.status}</p>`;
    });
  }

  document.getElementById("issueList").innerHTML = html;
}
</script>

</body>
</html>
