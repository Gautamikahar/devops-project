<!DOCTYPE html>
<html>
<head>
  <title>DevOps Dashboard</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f6f9;
    }

    header {
      background: #2c3e50;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 24px;
    }

    .container {
      width: 350px;
      margin: 40px auto;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      text-align: center;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 8px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      background: #3498db;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #2980b9;
    }

    .hidden {
      display: none;
    }

    /* POPUP */
    .popup {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 15px;
      border-radius: 8px;
      color: white;
      font-size: 14px;
      display: none;
      animation: fadeIn 0.5s;
    }

    .success {
      background: #2ecc71;
    }

    .error {
      background: #e74c3c;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>

<header>DevOps Issue Tracking Dashboard</header>

<div id="popup" class="popup"></div>

<!-- LOGIN -->
<div id="loginBox" class="container">
  <h2>Login</h2>
  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">

  <div class="container">
    <h2>Report Issue</h2>
    <input id="title" placeholder="Enter issue">
    <button onclick="submitIssue()">Submit</button>
  </div>

  <div class="container">
    <h2>Update Issue Status</h2>
    <input id="issueId" placeholder="Issue ID">
    <input id="status" placeholder="resolved / pending">
    <button onclick="updateStatus()">Update</button>
  </div>

</div>

<script>
  const USER_URL = "https://devops-project-1c2y.onrender.com";
  const ISSUE_URL = "https://devops-issue-service.onrender.com";
  const ADMIN_URL = "https://devops-project-admin-service.onrender.com";

  function showPopup(message, type) {
    const popup = document.getElementById("popup");
    popup.innerText = message;
    popup.className = "popup " + type;
    popup.style.display = "block";

    setTimeout(() => {
      popup.style.display = "none";
    }, 3000);
  }

  async function login() {
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    if (!username || !password) {
      return showPopup("Fill all fields!", "error");
    }

    try {
      const res = await fetch(USER_URL + "/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
      });

      const text = await res.text();

      if (res.ok) {
        showPopup(text, "success");

        document.getElementById("loginBox").classList.add("hidden");
        document.getElementById("dashboard").classList.remove("hidden");

      } else {
        showPopup(text, "error");
      }
    } catch {
      showPopup("Server error!", "error");
    }
  }

  async function submitIssue() {
    const title = document.getElementById("title").value;

    if (!title) {
      return showPopup("Enter issue title!", "error");
    }

    try {
      const res = await fetch(ISSUE_URL + "/issue", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ title })
      });

      const data = await res.json();
      showPopup("Issue Created (ID: " + data.id + ")", "success");

    } catch {
      showPopup("Error creating issue!", "error");
    }
  }

  async function updateStatus() {
    const id = document.getElementById("issueId").value;
    const status = document.getElementById("status").value;

    if (!id || !status) {
      return showPopup("Fill all fields!", "error");
    }

    try {
      const res = await fetch(ADMIN_URL + `/issue/${id}/status`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ status })
      });

      const text = await res.text();

      if (res.ok) {
        showPopup(text, "success");
      } else {
        showPopup(text, "error");
      }

    } catch {
      showPopup("Server error!", "error");
    }
  }
</script>

</body>
</html>
